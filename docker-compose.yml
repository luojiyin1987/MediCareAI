services:
  # PostgreSQL数据库 (with pgvector extension)
  postgres:
    image: pgvector/pgvector:pg17
    container_name: medicare_postgres
    environment:
      POSTGRES_DB: medicareai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "0.0.0.0:5432:5432"
    networks:
      - medicare_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicare_user -d medicareai"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Redis缓存
  redis:
    image: redis:7.4-alpine
    container_name: medicare_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medicare_network
    restart: always

  # 后端API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - USE_CN_MIRROR=${USE_CN_MIRROR:-false}
    container_name: medicare_backend
    # 生产环境配置 - 4个工作进程
    command: ["--workers", "4"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://medicare_user:${POSTGRES_PASSWORD}@medicare_postgres:5432/medicareai
      REDIS_URL: redis://:${REDIS_PASSWORD}@medicare_redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MINERU_TOKEN: ${MINERU_TOKEN}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      PUBLIC_FILE_URL: ${PUBLIC_FILE_URL}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      DEBUG: ${DEBUG:-true}
      # 安全配置 | Security Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["*"]}
      TRUSTED_PROXY_HOSTS: ${TRUSTED_PROXY_HOSTS:-["*"]}
      POSTGRES_HOST: medicare_postgres
      POSTGRES_USER: medicare_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: medicareai
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
      - uploads_data:/app/uploads
      - kb_data:/app/data/knowledge_bases
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - medicare_network
    restart: unless-stopped
    # DNS configuration for container networking
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # 前端应用 - 开发环境配置
  # 注意：使用 volumes 挂载源代码，支持热重载（HMR）
  # 生产环境请使用 docker-compose.prod.yml
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicare_frontend
    environment:
      - CHOKIDAR_USE_POLLING=true
      - ESLINT_NO_CACHE=true
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - medicare_network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: medicare_nginx
    ports:
      - "0.0.0.0:80:80"        # 患者平台
      - "0.0.0.0:8080:8080"    # 管理员平台
      - "0.0.0.0:8081:8081"    # 医生平台
      - "0.0.0.0:443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - medicare_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  kb_data:
  frontend_node_modules:

networks:
  medicare_network:
    driver: bridge
